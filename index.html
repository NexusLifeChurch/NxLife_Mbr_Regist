        }
        .card-title {

        }

        }
        input:focus { outline: none; border-color: var(--accent-gold); border-width: 2px; }

        .radio-group { display: flex; gap: 10px; margin-top: 5px; }
        .radio-item { flex: 1; }
        .radio-item input { display: none; }
        .radio-item label {
            display: block; padding: 12px; border: 1px solid var(--border-color);
            border-radius: 10px; text-align: center; cursor: pointer; font-weight: 400;
        }
        .radio-item input:checked + label {
            background: var(--accent-gold); color: white; border-color: var(--accent-gold);
        }

        .upload-area {
            border: 2px dashed var(--border-color); border-radius: 12px;
            padding: 25px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .upload-area:hover { border-color: var(--accent-gold); background: #fffdf9; }
        #preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid var(--accent-gold); }

        .btn-submit {
            width: 100%; background: linear-gradient(135deg, #B8860B, #8B6508);

        }
